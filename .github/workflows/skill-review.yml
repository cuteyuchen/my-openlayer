name: Skill Review

on:
  pull_request:
    paths:
      - '**/skill.md'
      - '**/skill.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tessl-io/skill-review-action@d81583861aaf29d1da7f10e6539efef4e27b0dd5
