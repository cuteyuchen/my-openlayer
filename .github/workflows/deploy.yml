name: Deploy VitePress site + Examples demo to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress docs
        run: npm run docs:build

      - name: Validate Tianditu token
        run: |
          if [ -z "$VITE_TIANDITU_TOKEN" ]; then
            echo "Missing GitHub Actions secret: TIANDITU_TOKEN"
            exit 1
          fi
        env:
          VITE_TIANDITU_TOKEN: ${{ secrets.TIANDITU_TOKEN }}

      - name: Build examples demo
        run: npm run demo:build
        env:
          VITE_TIANDITU_TOKEN: ${{ secrets.TIANDITU_TOKEN }}

      - name: Merge demo into docs dist
        run: cp -r demo-dist docs/.vitepress/dist/demo

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
